<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Track your reps and sets during every workout. SetForge stores everything locally — no account, no cloud, no ads. Free for Windows and Android."
		/>

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="SetForge — Count Every Rep. Own Your Progress." />
		<meta
			property="og:description"
			content="A privacy-first gym rep counter for Windows and Android. Your workout data stays on your device."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta property="og:url" content="https://amecteau.github.io/setforge-fitness" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="SetForge — Count Every Rep. Own Your Progress." />
		<meta
			name="twitter:description"
			content="A privacy-first gym rep counter for Windows and Android. Your workout data stays on your device."
		/>
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<title>SetForge — Privacy-First Gym Rep Counter</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
